<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillytics</title>
    <link rel="shortcut icon" href="static/images/logo.png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4b71ed, #718dec);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px 0;
        }

        .container {
            position: relative;
            width: min(400px, 92vw);
            min-height: 500px;
            height: auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
            z-index: 1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, rgba(110, 142, 251, 0.4), rgba(167, 119, 227, 0.4));
            border-radius: 50%;
            filter: blur(30px);
            z-index: -1;
            animation: blob-animation 8s infinite alternate;
        }

        @keyframes blob-animation {
            0% {
                transform: translate(-30%, -30%) scale(1);
            }

            100% {
                transform: translate(30%, 30%) scale(1.2);
            }
        }

        .logo {
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: bold;
            color: #444;
            text-align: center;
            animation: fade-in 1s ease;
        }

        .logo span {
            color: #6e8efb;
        }

        .form-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
            animation: slide-up 0.5s ease;
        }

        @keyframes slide-up {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .form-group:nth-child(2) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            color: #333;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6e8efb;
            box-shadow: 0 0 0 3px rgba(110, 142, 251, 0.2);
        }

        .form-group label {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            font-size: 16px;
            color: #999;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus+label,
        .form-group input:not(:placeholder-shown)+label {
            top: 0;
            left: 15px;
            transform: translateY(-50%);
            font-size: 12px;
            background: #f8f9fa;
            padding: 0 8px;
            color: #6e8efb;
        }

        .form-group input::placeholder {
            color: transparent;
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #6e8efb;
        }

        .options {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
            font-size: 14px;
            animation: fade-in 1s ease 0.3s forwards;
            opacity: 0;
        }

        .options a {
            color: #6e8efb;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .options a:hover {
            color: #a777e3;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            }

            50% {
                transform: scale(1.03);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            }
        }

        .btn:hover {
            box-shadow: 0 8px 25px rgba(110, 142, 251, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .signup-link {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            text-align: center;
            animation: fade-in 1s ease 0.4s forwards;
            opacity: 0;
        }

        .signup-link a {
            color: #6e8efb;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #a777e3;
            text-decoration: underline;
        }

        /* Animation for blobs in background */
        .background-shapes {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 20%;
            left: 10%;
            animation: float 10s ease-in-out infinite;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            left: 20%;
            animation: float 8s ease-in-out infinite 1s;
        }

        .shape:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 30%;
            right: 10%;
            animation: float 12s ease-in-out infinite 2s;
        }

        .shape:nth-child(4) {
            width: 120px;
            height: 120px;
            bottom: 15%;
            right: 20%;
            animation: float 9s ease-in-out infinite 3s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(-30px, 30px) rotate(180deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        /* Flash popup container */
        .custom-flash-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #28a745;
            /* Default success */
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            max-width: 90%;
            width: auto;
            display: none;
            font-size: 15px;
            font-weight: 50;
            animation: fadeInOut 4s ease-in-out forwards;
        }

        /* Danger style override */
        .custom-flash-popup.danger {
            background-color: #dc3545;
        }

        /* Toast fade in/out animation */
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                top: 20px;
            }

            10% {
                opacity: 1;
                top: 30px;
            }

            90% {
                opacity: 1;
                top: 30px;
            }

            100% {
                opacity: 0;
                top: 20px;
            }
        }

        .custom-flash-popup .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="background-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">

        <div class="logo">User <span>Portal</span></div>

        <form id="login-form" action="{{ url_for('auth.user_login') }}" method="POST" style="width: 100%;">
            <div class="form-group">
                <input type="text" id="userid" name="user-id-or-email" placeholder=" " required>
                <label for="userid">User ID or Email</label>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="user-password" placeholder=" " required>
                <label for="password">Password</label>
                <span class="password-toggle" onclick="togglePassword()">👁️</span>
            </div>

            <div class="options">
                <a href="{{ url_for('auth.forgot_password') }}" id="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>
    </div>
    <div id="flash-popup"
        class="custom-flash-popup {% for category, message in get_flashed_messages(with_categories=true) %}{{ category }}{% endfor %}"
        data-message="{% for category, message in get_flashed_messages(with_categories=true) %}{{ message }}{% endfor %}"
        style="display: none;">
        <div class="popup-content">
            <span id="popup-message"></span>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const popup = document.getElementById('flash-popup');
            const msg = document.getElementById('popup-message');
            const message = popup.getAttribute('data-message');

            if (message) {
                msg.textContent = message;
                popup.style.display = 'block';
            }
        });
    </script>


    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggle.textContent = '🔒';
            } else {
                passwordField.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        // Add slide-up animation to form elements when page loads
        document.addEventListener('DOMContentLoaded', function () {
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach((group, index) => {
                group.style.animationDelay = `${0.1 * (index + 1)}s`;
            });
        });
    </script>
</body>

</html>
