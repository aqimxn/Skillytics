<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="shortcut icon" href="static/images/logo.png" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        label {
            display: block;
            color: #444;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            background-color: #f9fafc;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #4a7bff;
            box-shadow: 0 0 0 3px rgba(74, 123, 255, 0.1);
        }
        
        button {
            background-color: #4a7bff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #3a6ae6;
        }
        
        .back-link {
            color: #4a7bff;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin-top: 24px;
            cursor: pointer;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .icon {
            margin-bottom: 20px;
            color: #4a7bff;
        }
        
        .success-message {
            color: #28a745;
            background-color: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 0 16px;
            }
        }

          /* Flash popup container */
      .custom-flash-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        background-color: #28a745; /* Default success */
        color: white;
        padding: 15px 25px;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        z-index: 2000;
        max-width: 90%;
        width: auto;
        display: none;
        font-size: 15px;
        font-weight: 50;
        animation: fadeInOut 4s ease-in-out forwards;
      }
      
      /* Danger style override */
      .custom-flash-popup.danger {
        background-color: #dc3545;
      }
      
      /* Toast fade in/out animation */
      @keyframes fadeInOut {
        0% { opacity: 0; top: 20px; }
        10% { opacity: 1; top: 30px; }
        90% { opacity: 1; top: 30px; }
        100% { opacity: 0; top: 20px; }
      }
      
      .custom-flash-popup .close-btn {
        position: absolute;
        top: 5px;
        right: 10px;
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }
    </style>
</head>
<body>
    <div class="container" id="request-reset">
        <div class="icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a7bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>
        <h1>Forgot Password</h1>
        <p>Enter your email address below and we'll send you a link to reset your password.</p>
        
        <form id="reset-form" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <button type="submit">Send Reset Link</button>
        </form>
        
        <a href="{{ url_for('auth.user_login') }}" class="back-link">Return to Login</a>
    </div>

    <div id="flash-popup" class="custom-flash-popup {% for category, message in get_flashed_messages(with_categories=true) %}{{ category }}{% endfor %}" data-message="{% for category, message in get_flashed_messages(with_categories=true) %}{{ message }}{% endfor %}" style="display: none;">
        <div class="popup-content">
          <span id="popup-message"></span>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
          const popup = document.getElementById('flash-popup');
          const msg = document.getElementById('popup-message');
          const message = popup.getAttribute('data-message');
      
          if (message) {
            msg.textContent = message;
            popup.style.display = 'block';
          }
        });
    </script>

</body>
</html>
