{% extends "base.html" %}

{% block title %}Skillytics{% endblock %}

{% block custom_style %}
<style>
    :root {
        --primary-color: #3b5bdb;
        --primary-hover: #4c6ef5;
        --error-color: #fa5252;
        --success-color: #40c057;
        --gray-light: #f8f9fa;
        --gray-medium: #ced4da;
        --text-color: #000000;
    }

    .content-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
    }
    
    .card {
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
        overflow: hidden;
        transition: transform 0.3s;
    }
    
    
    .card-body {
        padding: 30px;
    }
    
    h4 {
    color: #2c3e50;
    font-weight: 600;
    margin-bottom: 25px;
    position: relative;
    display: inline-block;
  }
  
  h4:after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -10px;
    width: 150px;
    height: 4px;
    background: linear-gradient(to right, #3498db, #2980b9);
    border-radius: 2px;
  }
    
    .form-group {
        margin-bottom: 25px;
        position: relative;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #495057;
    }
    
    .input-container {
        position: relative;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px;
        padding-right: 40px;
        font-size: 16px;
        border: 1px solid var(--gray-medium);
        border-radius: 5px;
        transition: all 0.3s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(76, 110, 245, 0.15);
    }
    
    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #6c757d;
        transition: color 0.2s;
    }
    
    .toggle-password:hover {
        color: var(--primary-color);
    }
    
    .btn {
        display: inline-block;
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        font-weight: 500;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        font-weight: normal;
    }
    
    .btn:hover {
        background-color: var(--primary-hover);
        color: white;
    }
    
    .btn-block {
        width: 100%;
    }
    
    .password-requirements {
        margin-top: 20px;
        padding: 15px;
        background-color: var(--gray-light);
        border-radius: 5px;
    }
    
    .requirements-title {
        font-weight: 600;
        margin-bottom: 10px;
        display: block;
    }
    
    .requirement-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        color: #6c757d;
        font-size: 14px;
    }
    
    .requirement-icon {
        margin-right: 8px;
        font-size: 12px;
    }
    
    .requirement-valid {
        color: var(--success-color);
    }
    
    .alert {
        padding: 12px 15px;
        margin-bottom: 20px;
        border-radius: 5px;
        display: none;
    }
    
    .alert-success {
        background-color: rgba(64, 192, 87, 0.1);
        border-left: 4px solid var(--success-color);
        color: #2b7a37;
    }
    
    .alert-error {
        background-color: rgba(250, 82, 82, 0.1);
        border-left: 4px solid var(--error-color);
        color: #c92a2a;
    }
    
    /* Animation for password strength */
    .strength-meter {
        height: 5px;
        width: 100%;
        background-color: #e9ecef;
        border-radius: 3px;
        margin-top: 8px;
        position: relative;
        overflow: hidden;
    }
    
    .strength-meter-fill {
        height: 100%;
        width: 0;
        transition: width 0.3s ease;
    }
    
    /* Weak */
    .strength-weak .strength-meter-fill {
        width: 33%;
        background-color: var(--error-color);
    }
    
    /* Medium */
    .strength-medium .strength-meter-fill {
        width: 66%;
        background-color: #fcc419;
    }
    
    /* Strong */
    .strength-strong .strength-meter-fill {
        width: 100%;
        background-color: var(--success-color);
    }
    
    .strength-text {
        font-size: 12px;
        margin-top: 5px;
        color: #6c757d;
    }
    
    @media (max-width: 576px) {
        .card-body {
            padding: 20px;
        }
    }
</style>
{% endblock %}

{% block content %}
<body>
    <div class="content-wrapper">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Change Password</h4>
                
                <form id="changePasswordForm" method="POST">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <div class="input-container">
                            <input type="password" id="current-password" class="form-control" name="current-password" required>
                            <i class="toggle-password fas fa-eye" data-target="current-password"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <div class="input-container">
                            <input type="password" id="new-password" class="form-control" name="new-password" required>
                            <i class="toggle-password fas fa-eye" data-target="new-password"></i>
                        </div>
                        
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <div class="input-container">
                            <input type="password" id="confirm-password" class="form-control" name="confirm-password" required>
                            <i class="toggle-password fas fa-eye" data-target="confirm-password"></i>
                        </div>
                    </div>
                    
                    <div style="margin-top: 25px; font-style: normal;">
                        <button type="submit" class="btn btn-block">Update Password</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>
<script>
document.addEventListener("DOMContentLoaded", function () {
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        Swal.fire({
            icon: "{{ 'success' if category == 'success' else 'error' }}",
            title: "{{ 'Success' if category == 'success' else 'Error' }}",
            text: "{{ message }}"
        });
        {% endfor %}
    {% endif %}
    {% endwith %}
});
</script>
<script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(toggle => {
        toggle.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });
    });

    document.addEventListener("DOMContentLoaded", function () {
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            Swal.fire({
              icon: "{{ 'success' if category == 'success' else 'error' }}",
              title: "{{ 'Success' if category == 'success' else 'Error' }}",
              text: "{{ message }}"
            });
          {% endfor %}
        {% endif %}
      {% endwith %}
    });
</script>
{% endblock %}
